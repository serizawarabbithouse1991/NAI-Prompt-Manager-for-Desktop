<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0e0e10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="72" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
  
  <!-- Image icon -->
  <g transform="translate(96, 96)">
    <!-- Frame -->
    <rect x="0" y="0" width="320" height="280" rx="24" fill="#27272a" stroke="url(#accent)" stroke-width="6"/>
    
    <!-- Mountain/landscape -->
    <path d="M40 200 L120 120 L180 160 L260 80 L280 100 L280 240 L40 240 Z" fill="#3f3f46"/>
    <path d="M40 200 L120 120 L180 160 L200 145 L200 240 L40 240 Z" fill="#52525b"/>
    
    <!-- Sun -->
    <circle cx="240" cy="80" r="30" fill="url(#accent)"/>
  </g>
  
  <!-- Text "NAI" -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accent)">NAI</text>
</svg>
